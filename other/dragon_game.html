<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Rider</title>
<style>
    body {
        margin: 0;
        background: #1a1a2e;
        overflow: hidden;
        font-family: monospace;
        text-align: center;
        color: white;
    }

    canvas {
        background: linear-gradient(#5cc8ff, #c2f0ff);
        display: block;
        margin: 0 auto;
        image-rendering: pixelated;
        border: 4px solid #222;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
// ===============================
// BASIC SETUP
// ===============================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "start"; // start | playing | gameover
let score = 0;
let speed = 3;
let health = 3;
let frame = 0;

// ===============================
// PLAYER (VIKING + DRAGON)
// ===============================
const player = {
    x: 100,
    y: 200,
    width: 60,
    height: 30,
    dy: 0
};

// ===============================
// ARRAYS
// ===============================
let obstacles = [];
let fireballs = [];
let particles = [];
let fishes = [];

// ===============================
// INPUT CONTROLS
// ===============================
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (gameState === "start") startGame();

    if (e.key === "f" && gameState === "playing") {
        fireballs.push({
            x: player.x + 50,
            y: player.y + 10,
            width: 10,
            height: 4
        });
    }
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

// ===============================
// START GAME
// ===============================
function startGame() {
    gameState = "playing";
    score = 0;
    health = 3;
    speed = 3;
    obstacles = [];
    fireballs = [];
    particles = [];
}

// ===============================
// DRAW BACKGROUND
// ===============================
function drawBackground() {
    // Mountains
    ctx.fillStyle = "#6b7a8f";
    ctx.fillRect(0, 250, 800, 150);

    // Clouds
    ctx.fillStyle = "white";
    ctx.fillRect(100, 80, 60, 20);
    ctx.fillRect(400, 50, 80, 25);
    ctx.fillRect(650, 90, 50, 18);
}

// ===============================
// DRAW PLAYER
// ===============================
function drawPlayer() {
    // Dragon body
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(player.x, player.y, 40, 20);

    // Wing animation
    ctx.fillStyle = "#27ae60";
    if (frame % 20 < 10) {
        ctx.fillRect(player.x + 10, player.y - 15, 30, 15);
    } else {
        ctx.fillRect(player.x + 10, player.y + 10, 30, 15);
    }

    // Viking
    ctx.fillStyle = "#8e5c42";
    ctx.fillRect(player.x + 30, player.y - 10, 10, 10);
}

// ===============================
// DRAW UI
// ===============================
function drawUI() {
    ctx.fillStyle = "black";
    ctx.font = "16px monospace";
    ctx.fillText("Score: " + Math.floor(score), 10, 20);

    ctx.fillText("Health: ", 10, 40);

    for (let i = 0; i < health; i++) {
        ctx.fillStyle = "red";
        ctx.fillRect(70 + i * 20, 30, 15, 15);
    }
}

// ===============================
// SPAWN OBSTACLES
// ===============================
function spawnObstacle() {
    obstacles.push({
        x: 800,
        y: Math.random() * 300 + 50,
        width: 30,
        height: 30
    });
}
// ===============================
// SPAWN HEALING FISH
// ===============================
function spawnFish() {
    fishes.push({
        x: 800,
        y: Math.random() * 300 + 50,
        width: 20,
        height: 12
    });
}
// ===============================
// COLLISION DETECTION
// ===============================
function isColliding(a, b) {
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

// ===============================
// GAME LOOP
// ===============================
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground();

    if (gameState === "start") {
        ctx.fillStyle = "black";
        ctx.font = "30px monospace";
        ctx.fillText("DRAGON RIDER", 250, 150);
        ctx.font = "16px monospace";
        ctx.fillText("Press any key to start", 290, 200);
        requestAnimationFrame(update);
        return;
    }

    if (gameState === "gameover") {
        ctx.fillStyle = "black";
        ctx.font = "30px monospace";
        ctx.fillText("GAME OVER", 300, 150);
        ctx.font = "16px monospace";
        ctx.fillText("Final Score: " + Math.floor(score), 310, 200);
        ctx.fillText("Press any key to restart", 260, 230);
        requestAnimationFrame(update);
        return;
    }

    // =====================
    // PLAYER MOVEMENT
    // =====================
    if (keys["ArrowUp"] || keys[" "]) player.y -= 4;if (keys["ArrowUp"] || keys[" "]) {
    player.y -= 4;

    if(frame % 8 === 0) // rhythmic flap
        playSound(400, 0.05, "triangle", 0.05);
}
    if (keys["ArrowDown"]) player.y += 4;

    player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

    drawPlayer();

    // =====================
    // OBSTACLES
    // =====================
    if (Math.random() < 0.02) spawnObstacle();

    obstacles.forEach((obs, index) => {
        obs.x -= speed;

        ctx.fillStyle = "#555";
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        if (isColliding(player, obs)) {
            obstacles.splice(index, 1);
            health--;
            if (health <= 0) gameState = "gameover";
        }

        if (obs.x < -50) obstacles.splice(index, 1);
    }); // =====================
// FISH (HEALTH PICKUP)
// =====================
    if (Math.random() < 0.008) spawnFish();

        fishes.forEach((fish, index) => {
        fish.x -= speed;

        // fish body
        ctx.fillStyle = "#3aa6ff";
        ctx.fillRect(fish.x, fish.y, fish.width, fish.height);

        // tail
        ctx.fillRect(fish.x + fish.width, fish.y + 3, 6, 6);

        // eye
        ctx.fillStyle = "white";
        ctx.fillRect(fish.x + 4, fish.y + 3, 2, 2);

    // collision with player
    if (isColliding(player, fish)) {

        if (health < 3) health++;

        // healing sound
        playSound(900, 0.15, "triangle", 0.2);
        setTimeout(()=>playSound(1200,0.15,"triangle",0.15),120);

        // splash particles
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: fish.x,
                y: fish.y,
                dx: Math.random()*4-2,
                dy: Math.random()*4-2,
                life: 25
            });
        }

        fishes.splice(index, 1);
    }

    if (fish.x < -50) fishes.splice(index, 1);
});

    // =====================
    // FIREBALLS
    // =====================
    fireballs.forEach((fb, fIndex) => {
        fb.x += 6;

        ctx.fillStyle = "orange";
        ctx.fillRect(fb.x, fb.y, fb.width, fb.height);

        obstacles.forEach((obs, oIndex) => {
            if (isColliding(fb, obs)) {
                // Particle effect
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: obs.x,
                        y: obs.y,
                        dx: Math.random() * 4 - 2,
                        dy: Math.random() * 4 - 2,
                        life: 20
                    });
                }

                obstacles.splice(oIndex, 1);
                fireballs.splice(fIndex, 1);
            }
        });

        if (fb.x > 800) fireballs.splice(fIndex, 1);
    });

    // =====================
    // PARTICLES
    // =====================
    particles.forEach((p, index) => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle = "yellow";
        ctx.fillRect(p.x, p.y, 3, 3);

        if (p.life <= 0) particles.splice(index, 1);
    });

    // =====================
    // SCORE & DIFFICULTY
    // =====================
    score += 0.1;
    if (score % 200 < 0.1) speed += 0.5;

    drawUI();

    frame++;
    requestAnimationFrame(update);
}
// ===============================
// SOUND ENGINE (Retro Beep Sounds)
// ===============================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

function playSound(freq, duration, type="square", volume=0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

update();
</script>

</body>
</html>
